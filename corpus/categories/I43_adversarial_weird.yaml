id: I43_adversarial_weird
name: Adversarial & weird
group: I_edge_cases
count: 20
preamble: |
  Category: Adversarial and weird inputs — token-level attacks and edge cases.
  Generate realistic adversarial inputs that stress-test tokenization and parsing.
  Include: repeated characters ("aaaaaaa"), Unicode exploits (RTL override, zero-width
  spaces, homoglyphs), prompt injection attempts, extremely long single words,
  emoji-only messages, mixed scripts (Cyrillic in Latin words), control characters,
  markdown injection, LaTeX injection, recursive self-reference.
  These test robustness to malformed or adversarial input, not harmful content.
  Vary: tokenization attacks to encoding tricks to format injection.
batches:
  - instruction: "Generate 10 adversarial/weird inputs. Mix repeated characters, Unicode exploits, emoji-only messages, and prompt injection attempts."
  - instruction: "Generate 10 more. Include: a homoglyph attack, a zero-width space insertion, an extremely long single word, mixed-script text, and a markdown injection attempt."
